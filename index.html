<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Centro de Simulación</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0f1c;
    --surface:#121a2b;
    --surface-2:#17223a;
    --line:rgba(255,255,255,.07);
    --ink:#edf1f7;
    --muted:#7e8ba3;
    --ok:#2dd4bf;
    --ok-dim:rgba(45,212,191,.14);
    --busy:#fb7185;
    --busy-dim:rgba(251,113,133,.16);
    --accent:#5b8def;

    --libre-1:#0d9488;
    --libre-2:#10b981;
    --ocupada-1:#9f1239;
    --ocupada-2:#e11d48;
    --debrief-1:#b45309;
    --debrief-2:#f59e0b;
    --radius:20px;
    --font-display:'Space Grotesk',system-ui,sans-serif;
    --font-body:'IBM Plex Sans',system-ui,sans-serif;
    --font-mono:'IBM Plex Mono',ui-monospace,monospace;
    color-scheme: dark;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:var(--font-body);
    color:var(--ink);
    position:relative;
    background:
      radial-gradient(1100px 620px at 8% -10%, rgba(91,141,239,.10), transparent 55%),
      radial-gradient(900px 700px at 105% 10%, rgba(45,212,191,.06), transparent 60%),
      radial-gradient(800px 560px at 20% 115%, rgba(180,83,9,.05), transparent 60%),
      radial-gradient(700px 500px at 90% 100%, rgba(91,141,239,.05), transparent 60%),
      var(--bg);
    background-attachment:fixed;
  }
  body.cursor-hidden{cursor:none;}

  /* Sutil textura de puntos + líneas en el fondo */
  body::before{
    content:"";
    position:fixed;inset:0;
    z-index:0;pointer-events:none;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(255,255,255,.05) 1px, transparent 0);
    background-size:36px 36px;
    -webkit-mask-image:radial-gradient(1400px 900px at 50% 0%, #000 0%, transparent 78%);
    mask-image:radial-gradient(1400px 900px at 50% 0%, #000 0%, transparent 78%);
    opacity:.6;
  }
  body::after{
    content:"";
    position:fixed;inset:0;
    z-index:0;pointer-events:none;
    background-image:
      linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
    background-size:120px 120px;
    -webkit-mask-image:radial-gradient(1200px 800px at 50% 10%, #000 0%, transparent 70%);
    mask-image:radial-gradient(1200px 800px at 50% 10%, #000 0%, transparent 70%);
  }

  .wrap{max-width:1920px;margin:0 auto;padding:36px 48px 44px;position:relative;z-index:1;}

  /* ---------- Header ---------- */
  header{
    display:flex;align-items:center;justify-content:space-between;
    padding-bottom:22px;margin-bottom:26px;
    border-bottom:1px solid var(--line);
  }
  .brand{display:flex;gap:16px;align-items:center}
  .mode-toggle{
    width:48px;height:48px;border-radius:12px;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(155deg,var(--surface-2),var(--surface));
    border:1px solid var(--line);
    color:var(--accent);
    flex-shrink:0;
    padding:0;
    cursor:pointer;
    appearance:none;
    font:inherit;
  }
  .mode-toggle:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:3px;
  }
  .brand-text h1{
    font-family:var(--font-display);
    font-size:26px;font-weight:600;letter-spacing:.2px;margin:0;color:var(--ink);
  }
  .brand-text span{
    display:block;font-family:var(--font-mono);font-size:12px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--muted);margin-top:3px;
  }

  .clock{text-align:right;line-height:1.15;}
  .clock .time{
    font-family:var(--font-mono);font-weight:500;font-size:30px;color:var(--ink);
    letter-spacing:.03em;font-variant-numeric:tabular-nums;
  }
  .clock .date{
    font-family:var(--font-mono);font-size:13px;color:var(--muted);
    letter-spacing:.08em;text-transform:uppercase;margin-top:2px;
  }

  /* ---------- Grid ---------- */
  .grid{
    display:grid;grid-template-columns:repeat(4,minmax(0,1fr));
    grid-template-rows:repeat(2,minmax(0,1fr));gap:20px;
  }

  .card{
    position:relative;
    background:linear-gradient(150deg, var(--grad-1, var(--libre-1)) 0%, var(--grad-2, var(--libre-2)) 100%);
    border:1px solid rgba(255,255,255,.12);
    border-radius:var(--radius);
    padding:24px 26px 22px;
    min-height:200px;
    display:flex;flex-direction:column;justify-content:flex-start;
    overflow:hidden;cursor:pointer;
    isolation:isolate;
    box-shadow:
      0 14px 30px -8px rgba(0,0,0,.5),
      inset 0 1px 0 rgba(255,255,255,.28),
      inset 0 0 60px rgba(255,255,255,.05);
    transition:transform .2s ease, box-shadow .2s ease, filter .2s ease;
  }
  .card::before{
    content:"";position:absolute;inset:0;z-index:-1;
    background:radial-gradient(120% 90% at 8% -10%, rgba(255,255,255,.20), transparent 55%);
  }
  .card::after{
    content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
    background:linear-gradient(120deg,
      rgba(255,255,255,.30) 0%,
      rgba(255,255,255,0) 16%,
      rgba(255,255,255,0) 58%,
      rgba(255,255,255,.16) 72%,
      rgba(255,255,255,0) 88%);
    mix-blend-mode:soft-light;
    transition:opacity .3s ease;
  }
  .card:hover{
    transform:translateY(-3px);
    box-shadow:
      0 20px 40px -8px rgba(0,0,0,.55),
      inset 0 1px 0 rgba(255,255,255,.32),
      inset 0 0 60px rgba(255,255,255,.07);
    filter:brightness(1.04);
  }
  .card:focus-visible{
    outline:2px solid #fff;
    outline-offset:3px;
  }

  /* Barrido de luz sutil y periódico */
  .card-sheen{
    position:absolute;inset:0;z-index:0;pointer-events:none;
    overflow:hidden;
    border-radius:inherit;
  }
  .card-sheen::before{
    content:"";position:absolute;top:-40%;bottom:-40%;left:-60%;width:35%;
    background:linear-gradient(75deg,
      rgba(255,255,255,0) 0%,
      rgba(255,255,255,.22) 45%,
      rgba(255,255,255,.32) 50%,
      rgba(255,255,255,.22) 55%,
      rgba(255,255,255,0) 100%);
    transform:skewX(-18deg);
    animation:cardSheenSweep 40s ease-in-out infinite;
    mix-blend-mode:screen;
  }
  .card:nth-child(2) .card-sheen::before{animation-delay:5s;}
  .card:nth-child(3) .card-sheen::before{animation-delay:10s;}
  .card:nth-child(4) .card-sheen::before{animation-delay:15s;}
  .card:nth-child(5) .card-sheen::before{animation-delay:20s;}
  .card:nth-child(6) .card-sheen::before{animation-delay:25s;}
  .card:nth-child(7) .card-sheen::before{animation-delay:30s;}
  .card:nth-child(8) .card-sheen::before{animation-delay:35s;}
  @keyframes cardSheenSweep{
    0%,12%{left:-60%;}
    38%,100%{left:130%;}
  }

  .card-top{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1;}
  .eyebrow{
    display:flex;align-items:center;gap:8px;
    padding:5px 10px 5px 6px;border-radius:999px;
    background:rgba(255,255,255,.14);
    border:1px solid rgba(255,255,255,.22);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    font-family:var(--font-mono);font-size:11.5px;letter-spacing:.12em;
    text-transform:uppercase;color:rgba(255,255,255,.85);
  }
  .eyebrow .code{
    color:#fff;opacity:.85;
    background:rgba(255,255,255,.18);
    border-radius:999px;padding:2px 7px;
  }
  .led{
    width:8px;height:8px;border-radius:50%;
    background:#fff;
    box-shadow:0 0 0 4px rgba(255,255,255,.28);
  }
  .led.pulse{animation:ledPulse 1.8s ease-in-out infinite;}
  @keyframes ledPulse{
    0%,100%{box-shadow:0 0 0 4px rgba(255,255,255,.35);}
    50%{box-shadow:0 0 0 9px rgba(255,255,255,.10);}
  }

  .name{
    font-family:var(--font-display);
    font-size:60px;font-weight:600;line-height:1.12;
    letter-spacing:.1px;margin:14px 0 0 0;color:#fff;
    align-self:flex-start;
    text-align:left;
    position:relative;z-index:1;
    -webkit-text-stroke:1px rgba(0,0,0,.55);
    paint-order:stroke fill;
    text-shadow:
      -1.5px -1.5px 0 rgba(0,0,0,.45),
       1.5px -1.5px 0 rgba(0,0,0,.45),
      -1.5px  1.5px 0 rgba(0,0,0,.45),
       1.5px  1.5px 0 rgba(0,0,0,.45),
       0 2px 10px rgba(0,0,0,.25);
  }

  .name.beat{
    animation:nameShadowBeat 3.2s ease-in-out infinite;
  }
  @keyframes nameShadowBeat{
    0%,18%,100%{
      text-shadow:
        -1.5px -1.5px 0 rgba(0,0,0,.45),
         1.5px -1.5px 0 rgba(0,0,0,.45),
        -1.5px  1.5px 0 rgba(0,0,0,.45),
         1.5px  1.5px 0 rgba(0,0,0,.45),
         0 0 10px rgba(0,0,0,.25);
    }
    9%{
      text-shadow:
        -1.5px -1.5px 0 rgba(0,0,0,.45),
         1.5px -1.5px 0 rgba(0,0,0,.45),
        -1.5px  1.5px 0 rgba(0,0,0,.45),
         1.5px  1.5px 0 rgba(0,0,0,.45),
         0 0 28px rgba(0,0,0,.55);
    }
    27%{
      text-shadow:
        -1.5px -1.5px 0 rgba(0,0,0,.45),
         1.5px -1.5px 0 rgba(0,0,0,.45),
        -1.5px  1.5px 0 rgba(0,0,0,.45),
         1.5px  1.5px 0 rgba(0,0,0,.45),
         0 0 28px rgba(0,0,0,.55);
    }
    36%{
      text-shadow:
        -1.5px -1.5px 0 rgba(0,0,0,.45),
         1.5px -1.5px 0 rgba(0,0,0,.45),
        -1.5px  1.5px 0 rgba(0,0,0,.45),
         1.5px  1.5px 0 rgba(0,0,0,.45),
         0 0 10px rgba(0,0,0,.25);
    }
  }
  .pill{
    display:inline-flex;align-items:center;gap:8px;
    padding:7px 14px;border-radius:999px;
    font-family:var(--font-mono);font-weight:500;font-size:12.5px;
    letter-spacing:.04em;
    color:#fff;
    background:rgba(255,255,255,.16);
    border:1px solid rgba(255,255,255,.32);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
  }
  .pill svg{width:9px;height:9px;flex-shrink:0;color:#fff;}

  .foot{margin-top:auto;position:relative;z-index:1;}

  /* ---------- Alert banner ---------- */
  .alert-wrapper{
    display:none;align-items:stretch;gap:22px;
    margin:30px 0 4px;
    width:100%;
  }
  .alert-wrapper.mode-active{
    width:80%;
    max-width:100%;
    margin-left:auto;
    margin-right:auto;
  }
  .alert-card{
    flex:1;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;gap:8px;
    min-height:325px;margin:0 auto;
    padding:34px 40px;border-radius:var(--radius);
    border:1px solid rgba(255,255,255,.12);
    box-shadow:0 16px 40px rgba(185,28,58,.28);
    position:relative;overflow:hidden;
  }
  .alert-card::before,
  .alert-card::after{
    content:"";position:absolute;inset:0;z-index:0;
  }
  .alert-card::before{
    background:linear-gradient(135deg,var(--ocupada-1) 0%,var(--ocupada-2) 100%);
    animation:alertFadeRed 120s ease-in-out infinite;
  }
  .alert-card::after{
    background:linear-gradient(135deg,var(--debrief-1) 0%,var(--debrief-2) 100%);
    opacity:0;
    animation:alertFadeAmber 120s ease-in-out infinite;
  }
  @keyframes alertFadeRed{
    0%{opacity:1;} 50%{opacity:0;} 100%{opacity:1;}
  }
  @keyframes alertFadeAmber{
    0%{opacity:0;} 50%{opacity:1;} 100%{opacity:0;}
  }
  .alert-card > *{position:relative;z-index:1;}
  .alert-tag{
    font-family:var(--font-mono);font-size:13px;letter-spacing:.16em;text-transform:uppercase;
    color:rgba(255,255,255,.8);
  }
  .alert-card strong{
    font-family:var(--font-display);font-size:152px;font-weight:700;color:#fff;letter-spacing:.2px;
    line-height:1.05;
    -webkit-text-stroke:1.5px rgba(0,0,0,.55);
    paint-order:stroke fill;
    animation:alertShadowBeat 3.2s ease-in-out infinite;
    display:block;width:100%;text-align:center;align-self:center;
  }
  .alert-wrapper.mode-active .alert-card strong{
    font-size:102px;
  }
  @keyframes alertShadowBeat{
    0%,18%,100%{
      text-shadow:
        -2px -2px 0 rgba(0,0,0,.45),
         2px -2px 0 rgba(0,0,0,.45),
        -2px  2px 0 rgba(0,0,0,.45),
         2px  2px 0 rgba(0,0,0,.45),
         0 0 16px rgba(255,205,0,.95);
    }
    9%{
      text-shadow:
        -2px -2px 0 rgba(0,0,0,.45),
         2px -2px 0 rgba(0,0,0,.45),
        -2px  2px 0 rgba(0,0,0,.45),
         2px  2px 0 rgba(0,0,0,.45),
         0 0 42px rgba(255,205,0,.95);
    }
    27%{
      text-shadow:
        -2px -2px 0 rgba(0,0,0,.45),
         2px -2px 0 rgba(0,0,0,.45),
        -2px  2px 0 rgba(0,0,0,.45),
         2px  2px 0 rgba(0,0,0,.45),
         0 0 42px rgba(255,205,0,.95);
    }
    36%{
      text-shadow:
        -2px -2px 0 rgba(0,0,0,.45),
         2px -2px 0 rgba(0,0,0,.45),
        -2px  2px 0 rgba(0,0,0,.45),
         2px  2px 0 rgba(0,0,0,.45),
         0 0 16px rgba(255,205,0,.95);
    }
  }
  .alert-card span.sub{font-family:var(--font-body);font-size:22px;color:rgba(255,255,255,.92);font-weight:500;}
  .alert-image-frame{
    align-self:stretch;
    padding:10px;
    border-radius:22px;
    background:linear-gradient(155deg, rgba(255,255,255,.40), rgba(255,255,255,.08));
    border:1px solid rgba(255,255,255,.45);
    box-shadow:
      0 14px 30px rgba(0,0,0,.4),
      inset 0 1px 0 rgba(255,255,255,.5),
      inset 0 0 0 1px rgba(255,255,255,.08);
    display:flex;
    gap:18px;
    align-items:center;
  }
  .alert-image{
    display:block;
    width:220px;
    height:auto;
    border-radius:14px;object-fit:cover;
    border:1px solid rgba(255,255,255,.3);
    transition:opacity .6s ease;
  }
  .alert-caption{
    flex:1;
    color:rgba(255,255,255,.92);
    font-family:var(--font-body);
    font-size:18px;
    line-height:1.6;
    max-width:560px;
  }
  .alert-caption p{
    margin:0 0 .8em;
  }

  @media (max-width:1400px){ .grid{grid-template-columns:repeat(3,1fr);} }
  @media (max-width:1000px){ .grid{grid-template-columns:repeat(2,1fr);} .name{font-size:26px;} }
  @media (max-width:700px){
    .wrap{padding:24px 20px;}
    .grid{grid-template-columns:1fr;}
    header{flex-direction:column;align-items:flex-start;gap:14px;}
    .clock{text-align:left;}
    .alert-wrapper{flex-direction:column;}
    .alert-image-frame{align-self:flex-start;}
    .alert-image{height:auto;max-height:200px;}
  }

  @media (prefers-reduced-motion: reduce){
    .led.pulse{animation:none;}
    .card{transition:none;}
    .alert-card::before,
    .alert-card::after{animation:none;}
    .name.beat{animation:none;}
    .alert-card strong{animation:none;}
    .card-sheen::before{animation:none;display:none;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <button class="mode-toggle" type="button" aria-pressed="false" aria-label="Botón de modo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <rect x="3" y="4" width="18" height="16" rx="3" stroke="currentColor" stroke-width="1.6"/>
          <path d="M7 10h10M7 14h6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          <circle cx="17" cy="14" r="2" fill="currentColor"/>
        </svg>
      </button>
      <div class="brand-text">
        <h1>Centro de Simulación</h1>
        <span>Panel de estado de salas</span>
      </div>
    </div>
    <div class="clock">
      <div class="time" id="timeText"></div>
      <div class="date" id="dateText"></div>
    </div>
  </header>

  <section class="grid" id="grid"></section>

  <div class="alert-wrapper" id="alertWrapper">
    <div class="alert-card">
      <span class="alert-tag">Aviso</span>
      <strong>Mantenga silencio</strong>
      <span class="sub">Simulación en curso</span>
    </div>
    <div class="alert-image-frame">
      <img class="alert-image" src="enfermera.png" alt="Enfermera" />
      <div class="alert-caption" aria-live="polite"></div>
    </div>
  </div>
</div>

<script>
const BUSY_STATES = new Set(['ocupada', 'debrief']);
const ROOM_ORDER = [
  'Sala de Parto',
  'Neonatología',
  'Terapia Intensiva',
  'Quirófano',
  'Consultorio Adulto',
  'Consultorio Pediatría',
  'Sala de Debriefing A',
  'Sala de Debriefing B'
];

const ROOM_DEFINITIONS = ROOM_ORDER.map((name) => ({
  name,
  type: name.includes('Debriefing') ? 'debrief' : 'room',
  state: 'libre'
}));

const grid = document.getElementById('grid');
const alertWrapper = document.getElementById('alertWrapper');
const modeToggle = document.querySelector('.mode-toggle');
const alertImage = document.querySelector('.alert-image');
const alertCaption = document.querySelector('.alert-caption');
const timeText = document.getElementById('timeText');
const dateText = document.getElementById('dateText');

const MODE_IMAGE_DIR = 'extra/';
const MODE_MANIFEST_PATH = 'extra/manifest.json';
const MODE_FALLBACK_ASSETS = [
  {
    image: 'Bernardo Houssay.png',
    caption: 'Bernardo Houssay\n\nPrimer latinoamericano en obtener el Premio Nobel de Fisiología o Medicina (1947). Sus investigaciones sobre la regulación hormonal del metabolismo revolucionaron la endocrinología.'
  },
  {
    image: 'Cecilia Grierson.png',
    caption: 'Cecilia Grierson (1859–1934)\n\nFue la primera mujer en graduarse como médica en Argentina (1889). Fundó la primera escuela de enfermería del país y promovió la profesionalización de la asistencia sanitaria. Fue una destacada defensora de los derechos civiles y educativos de las mujeres.'
  },
  {
    image: 'César Milstein.jpeg',
    caption: 'César Milstein\n\nRecibió el Premio Nobel de Medicina en 1984 por el desarrollo de los anticuerpos monoclonales.'
  }
];

let roomsData = ROOM_DEFINITIONS.map((room) => ({ ...room }));
let modeActive = false;
let modeAssets = [];
let modeImageIndex = 0;
let modeImageTimer = null;

function captionTextToHtml(text) {
  if (!text) return '';
  return text
    .split('\n')
    .map((line) => line.trim())
    .filter(Boolean)
    .map((line) => `<p>${line}</p>`)
    .join('');
}

async function loadModeAssetManifest() {
  try {
    const response = await fetch(MODE_MANIFEST_PATH);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    if (Array.isArray(data) && data.length) {
      modeAssets = data.filter((entry) => entry.image && entry.caption);
      if (modeAssets.length) return;
    }
  } catch (error) {
    console.warn('No se pudo cargar extra/manifest.json, usando assets fallback:', error);
  }
  modeAssets = MODE_FALLBACK_ASSETS;
}

function setAlertAsset(asset) {
  if (!alertImage) return;
  alertImage.style.opacity = '0';
  setTimeout(() => {
    alertImage.src = `${MODE_IMAGE_DIR}${asset.image}`;
    if (alertCaption) alertCaption.innerHTML = captionTextToHtml(asset.caption);
    alertImage.style.opacity = '1';
  }, 600);
}

function rotateModeImage() {
  if (!modeActive || modeAssets.length === 0) return;
  modeImageIndex = (modeImageIndex + 1) % modeAssets.length;
  setAlertAsset(modeAssets[modeImageIndex]);
}

function startModeImageRotation() {
  if (!alertImage || modeAssets.length === 0) return;
  modeImageIndex = 0;
  setAlertAsset(modeAssets[modeImageIndex]);
  clearInterval(modeImageTimer);
  modeImageTimer = setInterval(rotateModeImage, 30000);
}

function stopModeImageRotation() {
  clearInterval(modeImageTimer);
  modeImageTimer = null;
  if (!alertImage) return;
  alertImage.style.opacity = '0';
  setTimeout(() => {
    alertImage.src = 'enfermera.png';
    if (alertCaption) alertCaption.innerHTML = '';
    alertImage.style.opacity = '1';
  }, 600);
}

modeToggle.addEventListener('click', async () => {
  modeActive = !modeActive;
  alertWrapper.classList.toggle('mode-active', modeActive);
  modeToggle.setAttribute('aria-pressed', String(modeActive));
  if (modeActive) {
    await loadModeAssetManifest();
    startModeImageRotation();
  } else {
    stopModeImageRotation();
  }
});

let inactivityTimer;
const resetCursorTimer = () => {
  document.body.classList.remove('cursor-hidden');
  clearTimeout(inactivityTimer);
  inactivityTimer = setTimeout(() => {
    document.body.classList.add('cursor-hidden');
  }, 10000);
};

['mousemove', 'keydown', 'touchstart', 'click'].forEach((eventName) => {
  document.addEventListener(eventName, resetCursorTimer, { passive: true });
});

resetCursorTimer();

function dotSVG() {
  return '<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" fill="currentColor"/></svg>';
}

function stateLabel(room) {
  if (room.state === 'debrief') return 'Debriefing en curso';
  if (room.state === 'ocupada') return 'En simulación';
  return 'Libre';
}

function stateGradient(state) {
  if (state === 'debrief') return { g1: 'var(--debrief-1)', g2: 'var(--debrief-2)' };
  if (state === 'ocupada') return { g1: 'var(--ocupada-1)', g2: 'var(--ocupada-2)' };
  return { g1: 'var(--libre-1)', g2: 'var(--libre-2)' };
}

function eyebrowLabel(room) {
  return room.type === 'debrief' ? 'Debriefing' : 'Área clínica';
}

function roomDisplayName(name) {
  const normalized = (name || '').toString().trim().toLowerCase();
  if (['sala de debriefing 1', 'sala 1', '1', 'debriefing 1', 'debriefing a'].includes(normalized)) return 'Sala de Debriefing A';
  if (['sala de debriefing 2', 'sala 2', '2', 'debriefing 2', 'debriefing b'].includes(normalized)) return 'Sala de Debriefing B';
  return name;
}

function getRoomByName(name) {
  const key = roomDisplayName(name);
  return roomsData.find((room) => roomDisplayName(room.name) === key);
}

function toggleRoomState(name) {
  const room = getRoomByName(name);
  if (!room) return;

  if (room.type === 'debrief') {
    room.state = room.state === 'libre' ? 'debrief' : 'libre';
  } else {
    room.state = room.state === 'libre' ? 'ocupada' : 'libre';
  }

  render();
}

function render() {
  grid.innerHTML = '';
  let anyBusy = false;

  const rooms = [...roomsData].sort((a, b) => {
    const aName = roomDisplayName(a.name);
    const bName = roomDisplayName(b.name);
    return ROOM_ORDER.indexOf(aName) - ROOM_ORDER.indexOf(bName);
  });

  rooms.forEach((room, index) => {
    const roomState = room.state;
    if (BUSY_STATES.has(roomState)) anyBusy = true;

    const { g1, g2 } = stateGradient(roomState);
    const code = String(index + 1).padStart(2, '0');

    const card = document.createElement('div');
    card.className = 'card';
    card.style.setProperty('--grad-1', g1);
    card.style.setProperty('--grad-2', g2);
    card.setAttribute('tabindex', '0');
    card.setAttribute('role', 'button');
    card.setAttribute('aria-pressed', String(roomState !== 'libre'));
    card.addEventListener('click', () => toggleRoomState(room.name));
    card.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        toggleRoomState(room.name);
      }
    });

    card.innerHTML = `
      <div class="card-sheen"></div>
      <div class="card-top">
        <span class="eyebrow"><span class="code">${code}</span> ${eyebrowLabel(room)}</span>
        <span class="led ${roomState !== 'libre' ? 'pulse' : ''}"></span>
      </div>
      <h2 class="name ${BUSY_STATES.has(roomState) ? 'beat' : ''}">${roomDisplayName(room.name)}</h2>
      <div class="foot"><span class="pill">${dotSVG()} ${stateLabel(room)}</span></div>`;
    grid.appendChild(card);
  });

  alertWrapper.style.display = anyBusy ? 'flex' : 'none';
}

function updateDateTime() {
  const now = new Date();
  timeText.textContent = now.toLocaleTimeString('es-ES');
  dateText.textContent = now.toLocaleDateString('es-ES', {
    weekday: 'long',
    day: '2-digit',
    month: '2-digit',
    year: 'numeric'
  });
}

render();
updateDateTime();
setInterval(updateDateTime, 1000);
</script>
</body>
</html>
